services:
  informes-api:
    build: .
    container_name: informes-financieros-api
    restart: unless-stopped
    ports:
      # Puerto del host configurable por entorno (el contenedor siempre 8000).
      # Local: HOST_PORT ausente -> 8011. Produccion: HOST_PORT=8012 en .env.
      - "${HOST_PORT:-8011}:8000"
    environment:
      # Service Account (metodo unico). El JSON llega via el volumen credentials/.
      AUTH_METHOD: ${AUTH_METHOD:-service_account}
      SERVICE_ACCOUNT_FILE: ${SERVICE_ACCOUNT_FILE:-credentials/service_account.json}
      # OAuth: solo rollback de emergencia (si AUTH_METHOD=oauth).
      OAUTH_CLIENT_FILE: credentials/oauth_client.json
      OAUTH_TOKEN_FILE: credentials/token.json
      SLIDES_TEMPLATE_ID: ${SLIDES_TEMPLATE_ID}
      DRIVE_FOLDER_ID: ${DRIVE_FOLDER_ID:-}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SCHEMA_VENTAS: ${POSTGRES_SCHEMA_VENTAS:-finanzas_automation}
      POSTGRES_SCHEMA_INFORMES: ${POSTGRES_SCHEMA_INFORMES:-informes_financieros}
      # Si vacia, el servicio funciona sin auth. En produccion: definir.
      API_KEY: ${API_KEY:-}
    volumes:
      # Credenciales: read-write porque el token se refresca solo
      - ./credentials:/service/credentials
    networks:
      # Misma red que n8n: permite que n8n llame a este servicio por nombre.
      - n8n_net
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  n8n_net:
    # Nombre de la red Docker donde corre n8n. Configurable por entorno:
    #   Local:      DOCKER_NETWORK ausente -> sesion-idealista_default
    #   Produccion: DOCKER_NETWORK=app-network en el .env del servidor
    name: ${DOCKER_NETWORK:-sesion-idealista_default}
    external: true
